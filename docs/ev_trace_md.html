<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV-TRACE-MD Assistant v0.9</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #f0f2f5;
      line-height: 1.6
    }

    .app {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem
    }

    .gov {
      background: #fffbeb;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #78350f;
      margin-bottom: 1rem;
      display: flex;
      gap: 8px;
      align-items: flex-start
    }

    .vb {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      margin-left: 6px;
      vertical-align: middle
    }

    .prog-wrap {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 1rem
    }

    .pb {
      display: flex;
      align-items: center
    }

    .sd {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      background: #fff;
      color: #6b7280;
      transition: all .15s;
      user-select: none
    }

    .sd:hover {
      border-color: #93c5fd
    }

    .sd.active {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1d4ed8
    }

    .sd.done {
      background: #f0fdf4;
      border-color: #22c55e;
      color: #15803d
    }

    .sc {
      flex: 1;
      height: 1.5px;
      background: #e5e7eb
    }

    .sn {
      display: flex;
      margin-top: 6px
    }

    .snm {
      flex: 1;
      text-align: center;
      font-size: 10px;
      color: #9ca3af
    }

    .snm.active {
      color: #1d4ed8;
      font-weight: 600
    }

    .snm.done {
      color: #15803d
    }

    .panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem
    }

    .ptitle {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #111827
    }

    .fr {
      margin-bottom: 0.875rem
    }

    .fr label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 3px
    }

    .fr input,
    .fr select,
    .fr textarea {
      width: 100%;
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      color: #111827;
      font-family: inherit
    }

    .fr textarea {
      resize: vertical;
      min-height: 60px
    }

    .fr input:focus,
    .fr select:focus,
    .fr textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1)
    }

    .g2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .g3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px
    }

    @media(max-width:600px) {

      .g2,
      .g3 {
        grid-template-columns: 1fr
      }
    }

    .rb-g {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px
    }

    .rb {
      padding: 5px 14px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
      color: #374151;
      transition: all .15s;
      user-select: none
    }

    .rb:hover {
      border-color: #93c5fd;
      background: #eff6ff;
      color: #1d4ed8
    }

    .rb.sel {
      background: #eff6ff;
      border-color: #3b82f6;
      color: #1d4ed8;
      font-weight: 500
    }

    .ck {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 9px;
      font-size: 14px;
      cursor: pointer;
      color: #374151
    }

    .ck input[type=checkbox] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #3b82f6
    }

    .btn {
      padding: 8px 18px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
      background: #fff;
      color: #374151;
      transition: all .15s;
      font-family: inherit
    }

    .btn:hover {
      background: #f9fafb;
      border-color: #9ca3af
    }

    .btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    .btn-p {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff
    }

    .btn-p:hover {
      background: #1e40af
    }

    .btn-ai {
      background: #065f46;
      border-color: #065f46;
      color: #fff;
      font-weight: 600
    }

    .btn-ai:hover {
      background: #047857
    }

    .btn-sec {
      background: #f3f4f6;
      border-color: #e5e7eb;
      color: #374151
    }

    .btn-d {
      background: #fef2f2;
      border-color: #fca5a5;
      color: #dc2626
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 1.25rem;
      flex-wrap: wrap;
      align-items: center
    }

    .spacer {
      flex: 1
    }

    .al {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 0.875rem;
      line-height: 1.5
    }

    .al-i {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af
    }

    .al-w {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #78350f
    }

    .al-s {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #14532d
    }

    .qcard {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      background: #fafafa
    }

    .lv-crítico {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fca5a5
    }

    .lv-importante {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: #fffbeb;
      color: #d97706;
      border: 1px solid #fcd34d
    }

    .lv-bajo {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #86efac
    }

    .out-in {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #86efac;
      margin-top: 0.625rem
    }

    .out-out {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      background: #f9fafb;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      margin-top: 0.625rem
    }

    .stat-g {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
      gap: 8px;
      margin-bottom: 1rem
    }

    .stat {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      min-height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center
    }

    .stat .n {
      font-size: 22px;
      font-weight: 700;
      color: #111827
    }

    .stat .l {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px
    }

    .stat.sc .n {
      color: #15803d
    }

    .stat.sw .n {
      color: #d97706
    }

    .stat.sd2 .n {
      color: #dc2626
    }

    .stat.si .n {
      color: #1d4ed8
    }

    .crit-card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden
    }

    .crit-hdr {
      padding: 10px 13px;
      background: #f9fafb;
      display: flex;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
      transition: background .1s
    }

    .crit-hdr:hover {
      background: #f3f4f6
    }

    .cid {
      font-size: 11px;
      font-weight: 700;
      background: #e5e7eb;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      color: #374151
    }

    .cnm {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      color: #111827;
      min-width: 0
    }

    .wp {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 700;
      flex-shrink: 0
    }

    .wB {
      background: #fef2f2;
      color: #dc2626
    }

    .wC {
      background: #fffbeb;
      color: #d97706
    }

    .wO {
      background: #f0fdf4;
      color: #15803d
    }

    .wBC {
      background: #fff7ed;
      color: #c2410c
    }

    .wCO {
      background: #f0fdf4;
      color: #15803d
    }

    .crit-body {
      padding: 13px;
      display: none;
      border-top: 1px solid #e5e7eb
    }

    .crit-body.open {
      display: block
    }

    .vsec {
      margin-bottom: 10px
    }

    .vsec h4 {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .vlist {
      font-size: 13px;
      padding-left: 1.25rem;
      color: #374151
    }

    .vlist li {
      margin-bottom: 3px
    }

    .ttag {
      font-size: 11px;
      padding: 2px 7px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      color: #6b7280;
      background: #f9fafb
    }

    .ev-blk {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 9px;
      font-size: 13px;
      color: #1e40af
    }

    .ev-org {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 9px;
      font-size: 13px;
      color: #78350f
    }

    .ev-pend {
      background: #f9fafb;
      border: 1px dashed #d1d5db;
      border-radius: 8px;
      padding: 9px 12px;
      margin-bottom: 9px;
      font-size: 13px;
      color: #6b7280
    }

    .sp {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      white-space: nowrap
    }

    .sp-c {
      background: #f0fdf4;
      color: #15803d
    }

    .sp-p {
      background: #fffbeb;
      color: #d97706
    }

    .sp-nc {
      background: #fef2f2;
      color: #dc2626
    }

    .sp-nv {
      background: #f3f4f6;
      color: #6b7280;
      border: 1px solid #e5e7eb
    }

    .sp-na {
      background: #f3f4f6;
      color: #9ca3af
    }

    .sp-auto-c {
      background: #f0fdf4;
      color: #15803d;
      border: 1.5px solid #86efac
    }

    .sp-auto-nc {
      background: #fef2f2;
      color: #dc2626;
      border: 1.5px solid #fca5a5
    }

    .sp-auto-nv {
      background: #f9fafb;
      color: #6b7280;
      border: 1.5px dashed #d1d5db
    }

    .eff-bar {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      color: #6b7280
    }

    .eff-bar strong {
      color: #1d4ed8
    }

    .fam-sec {
      margin-bottom: 1.25rem
    }

    .fam-tit {
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1.5px solid #e5e7eb;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .stbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px
    }

    .stbl th {
      background: #f9fafb;
      padding: 8px 11px;
      text-align: left;
      font-weight: 600;
      font-size: 12px;
      border: 1px solid #e5e7eb;
      color: #374151
    }

    .stbl td {
      padding: 7px 11px;
      border: 1px solid #e5e7eb;
      vertical-align: top;
      color: #374151
    }

    .rep-sec {
      margin-bottom: 1.25rem
    }

    .rep-sec h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #374151;
      padding-bottom: 4px;
      border-bottom: 1px solid #f3f4f6
    }

    .rep-blk {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem;
      font-size: 13px;
      line-height: 1.8;
      color: #374151
    }

    .rec-box {
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem
    }

    .rec-box.fav {
      background: #f0fdf4;
      border-color: #86efac
    }

    .rec-box.cond {
      background: #fffbeb;
      border-color: #fde68a
    }

    .rec-box.nofav {
      background: #fef2f2;
      border-color: #fca5a5
    }

    .rec-box.noc {
      background: #f9fafb;
      border-color: #e5e7eb
    }

    .rec-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px
    }

    .rec-title.fav {
      color: #15803d
    }

    .rec-title.cond {
      color: #d97706
    }

    .rec-title.nofav {
      color: #dc2626
    }

    .rec-title.noc {
      color: #6b7280
    }

    .dots {
      display: inline-flex;
      gap: 3px
    }

    .dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #1d4ed8;
      animation: dp 1.2s ease-in-out infinite
    }

    .dots span:nth-child(2) {
      animation-delay: .2s
    }

    .dots span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes dp {

      0%,
      80%,
      100% {
        opacity: .3;
        transform: scale(.8)
      }

      40% {
        opacity: 1;
        transform: scale(1)
      }
    }

    .ev-id {
      font-size: 11px;
      font-weight: 600;
      font-family: monospace;
      background: #f3f4f6;
      padding: 1px 7px;
      border-radius: 4px;
      color: #374151
    }

    .src-type {
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 4px;
      background: #f3f4f6;
      color: #6b7280;
      border: 1px solid #e5e7eb
    }

    .consult-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      margin: 2px
    }

    @media print {
      body {
        background: #fff !important;
        font-size: 12px !important;
        color: #000 !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact
      }

      .app {
        max-width: 100% !important;
        padding: 0 !important
      }

      .gov,
      .prog-wrap,
      .eff-bar,
      .btn-row,
      .btn,
      .btn-p,
      .btn-ai,
      .btn-sec,
      .btn-d {
        display: none !important
      }

      .panel {
        border: none !important;
        padding: 0.5rem 0 !important;
        margin-bottom: 0.5rem !important;
        box-shadow: none !important;
        page-break-inside: avoid
      }

      .ptitle {
        font-size: 14px !important;
        border-bottom: 1px solid #999 !important;
        padding-bottom: 4px !important
      }

      .rep-sec {
        page-break-inside: avoid;
        margin-bottom: 0.75rem !important
      }

      .rep-sec h3 {
        font-size: 12px !important;
        color: #000 !important;
        border-bottom: 1px solid #ccc !important
      }

      .rep-blk {
        background: #fff !important;
        border: 1px solid #ccc !important;
        padding: 8px !important;
        font-size: 11px !important
      }

      .rec-box {
        border: 1px solid #999 !important;
        background: #f9f9f9 !important;
        padding: 8px !important;
        page-break-inside: avoid
      }

      .rec-title {
        font-size: 13px !important;
        color: #000 !important
      }

      .stbl {
        font-size: 10px !important
      }

      .stbl th {
        background: #eee !important;
        color: #000 !important
      }

      .stbl td {
        padding: 4px 6px !important
      }

      .sp {
        font-size: 9px !important;
        border: 1px solid #999 !important
      }

      .wp {
        font-size: 9px !important;
        border: 1px solid #999 !important
      }

      .vb {
        font-size: 9px !important;
        border: 1px solid #999 !important;

      }

      .lv-critico,

      }

      .al-w {

      }

      a {

      }

      .stat-g {
        display: none !important
      }

      textarea,
      select,
      input {
        border: 1px solid #ccc !important;

      }

      .fr label {
        font-size: 11px !important;
        color: #000 !important
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <div class="gov">
      <span style="font-size:16px;flex-shrink:0">&#x26A0;&#xFE0F;</span>
      <div><strong>Prototipo academico &mdash; Marco EV-TRACE-MD <span class="vb">v0.9</span></strong> &mdash; Propuesta
        de estado documental. La resolución final corresponde al responsable de cumplimiento. </div>
    </div>
    <div class="prog-wrap">
      <div class="pb" id="pb"></div>
      <div class="sn" id="sn"></div>
    </div>
    <div id="ct"></div>
  </div>
  <script>
    'use strict';
    const STEPS = ['Inicio', 'Solicitud', 'Alcance', 'Clasificación', 'Evaluación', 'Hallazgos', 'Informe'];
    const SL = { 'cumple': 'Cumple', 'parcial': 'Cumple parcialmente', 'no-cumple': 'No cumple', 'no-verif': 'No verificable', 'no-aplica': 'No aplicable', '': "Sin evaluar" };
    const SRC_TYPES = ['Página oficial del producto', 'Documentación técnica oficial', 'Centro de seguridad o trust center', 'Política de privacidad, DPA o condiciones contractuales', 'SLA o página de estado', 'Repositorio oficial o registro de paquetes', 'Aviso oficial de seguridad o vulnerabilidad', 'Certificación, auditoría o declaración de cumplimiento', 'Evidencia aportada por la organización', 'Otra fuente publica pendiente de revisión'];

    let ST = { step: 0, form: { via: 'activa', dep: '', sol: '', resp: '', herr: '', prov: '', url: '', ver: '', lic: '', desc: '', uso: '', proc: '', tar: '', dp: false, ce: false, cs: false, samd: false, ia: false, ext: false, fecha_val: '' }, scope: { ans: {}, res: '', just: '' }, cls: { fam: 'S4.1', s5: false, s6: false, ca: {}, nivel: '' }, crit: {}, open: {}, evaluating: false, evalProgress: 0, evalTotal: 0, resolucion: '', obs_informe: '', report_mode: 'resumen' };

    function go(n) { if (n <= ST.step + 1) { ST.step = n; render(); } }

      function vis(o) { if (o === 1) return true; if (o === 2) return ans[1] === 'no'; if (o === 3) return ans[1] === 'no' && ans[2] === 'no'; if (o === 4) return ans[1] === 'no' && ans[2] === 'no' && ans[3] === 'no'; if (o === 5) return ans[1] === 'no' && ans[2] === 'no' && ans[3] === 'no' && ans[4] === 'si'; if (o === 6) return ans[1] === 'no' && ans[2] === 'no' && ans[3] === 'no' && ans[4] === 'si' && ans[5] === 'no'; return false; }

    function p4() {

        }

    async function callAPI(prompt, sys) {
      const resp = await fetch('https://api.anthropic.com/v1/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, tools: [{ type: 'web_search_20250305', name: 'web_search' }], system: sys, messages: [{ role: 'user', content: prompt }] }) });
      if (!resp.ok) throw new Error('API error ' + resp.status);
      const data = await resp.json(); const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
      const m = text.match(/\{[\s\S]*\}|\[[\s\S]*\]/); if (!m) throw new Error('Sin JSON válido en la respuesta'); return JSON.parse(m[0]);
    }

          ST.crit[c.id].status = 'no-verif';

    var SYS_EVAL = 'Eres un evaluador de seguridad y cumplimiento normativo especializado en herramientas software para fabricantes de Software como Producto Sanitario (SaMD) bajo regulación europea (MDR EU 2017/745, ISO 13485, IEC 62304, RGPD, AI Act).\n\nTu metodología de evaluación autónoma es la siguiente:\n1. Para cada criterio, DEBES buscar y leer activamente las fuentes públicas del proveedor relevantes para ese criterio específico.\n2. Fuentes prioritarias por tipo de criterio:\n   - Localización de datos, transferencias internacionales, subencargados: LEER política de privacidad del proveedor y DPA público\n   - Telemetría, uso de datos, entrenamiento de modelos: LEER política de privacidad y términos de servicio\n   - Cambios recientes, vulnerabilidades, versiones soportadas: LEER changelog / release notes / security advisories\n   - Certificaciones de seguridad (ISO 27001, SOC 2, ENS): LEER trust center / página de seguridad\n   - Disponibilidad y SLA: LEER status page y términos de servicio\n   - Acceso del proveedor a datos del cliente: LEER DPA público y términos de servicio\n   - Portabilidad de datos: LEER términos de servicio sección portabilidad\n   - Licencias, uso permitido: LEER EULA / términos de licencia\n   - Vulnerabilidades CVE: BUSCAR en NVD (nvd.nist.gov) y OSV (osv.dev)\n   - Procedencia y canal oficial: LEER página de descargas oficial y verificar checksum/firma\n3. Cita SIEMPRE la URL exacta o el nombre del documento que consultaste.\n4. Responde ÚNICAMENTE en JSON válido sin texto adicional ni bloques de código markdown:\n{"status":"cumple|parcial|no-cumple|no-verif","reasoning":"explicación concisa en español de máximo 180 palabras con los hechos verificados","evidence":"URL exacta o nombre del documento consultado"}\n\nReglas de asignación de estado — LEE CON ATENCIÓN:\n- "cumple": el proveedor cumple el criterio según la evidencia pública encontrada. Que existan medidas organizativas adicionales como capa extra de control NO convierte un cumplimiento del proveedor en parcial. Si el proveedor ofrece la funcionalidad, la documenta, o la garantiza, el estado es CUMPLE aunque la organización deba además activarla o configurarla.\n- "parcial": existen DUDAS REALES sobre el cumplimiento del proveedor — la evidencia encontrada es ambigua, incompleta o sugiere que el proveedor solo cubre parte del criterio, pero existe una medida organizativa razonable que puede mitigar esa desviación específica.\n- "no-cumple": encontraste evidencia pública clara de una carencia GRAVE del proveedor que NO puede compensarse con medidas organizativas. Reserva este estado únicamente para incumplimientos severos sin mitigación posible.\n- "no-verif": no encontraste evidencia pública suficiente, el criterio es organizativo, o requiere información no pública.\n\nEJEMPLOS:\n- El proveedor ofrece MFA pero la organización debe activarlo → "cumple" (el proveedor lo ofrece)\n- El proveedor menciona cifrado pero no especifica el estándar → "parcial" (duda del proveedor)\n- El proveedor no ofrece exportación de datos en ningún formato → "no-cumple" (carencia grave)\n- No encuentras información sobre el tema → "no-verif"\n\n- Si la verificación del proveedor dice "No aplica (criterio organizativo)", devuelve siempre "no-verif".\n- Sé conservador ante la duda: usa "no-verif" en lugar de fabricar información.\n- NO INVENTES URLs ni afirmes hechos que no hayas podido verificar mediante búsqueda.';
